<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none" role="img" aria-label="TM Digital Space">
  <defs>
    <!-- Icon gradient (diagonal) -->
    <linearGradient id="icon-g" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#006eff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <!-- Wordmark gradient (horizontal, spans text area) -->
    <linearGradient id="text-g" x1="68" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#006eff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark ──────────────────────────────────────────────── -->
  <rect width="48" height="48" rx="12" fill="url(#icon-g)"/>
  <!-- T glyph -->
  <path d="M5 9H21V13H15V39H11V13H5Z" fill="white"/>
  <!-- M glyph -->
  <path d="M23 9H27L33 22L39 9H43V39H23Z" fill="white"/>

  <!-- ── Wordmark ────────────────────────────────────────────────── -->
  <!-- "TM" in dark (slate-900) -->
  <text
    x="64" y="32"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="22" font-weight="800" letter-spacing="-0.4"
    fill="#0f172a"
  >TM</text>
  <!-- "Digital Space" in brand gradient -->
  <text
    x="97" y="32"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="22" font-weight="800" letter-spacing="-0.4"
    fill="url(#text-g)"
  >Digital Space</text>
</svg>
